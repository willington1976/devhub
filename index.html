<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#060608"/>
<meta name="description" content="devhub — panel de control de proyectos"/>
<link rel="manifest" href="manifest.json"/>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js')</script>
<title>devhub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060608;--bg1:#0c0c10;--bg2:#11111a;--bg3:#18181f;--bg4:#1f1f28;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.22);
  --text:#f0f0f5;--text2:#9898b0;--text3:#55556a;
  --cyan:#00e5ff;--violet:#a855f7;--lime:#a3e635;
  --amber:#fbbf24;--rose:#fb7185;--emerald:#34d399;
  --mono:'JetBrains Mono',monospace;
  --grotesk:'Space Grotesk',sans-serif;
  --manrope:'Manrope',sans-serif;
  --sora:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{height:100%;font-family:var(--manrope);font-size:13px;color:var(--text);overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.shell{display:grid;grid-template-rows:48px 1fr;height:100vh}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg1);position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan)55,var(--violet)55,transparent);opacity:.5}
.logo{font-family:var(--sora);font-size:17px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-ver{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;-webkit-text-fill-color:var(--text3);margin-left:4px}
.nav{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:8px;border:1px solid var(--border)}
.nav-btn{font-family:var(--grotesk);font-size:11px;font-weight:500;padding:4px 14px;border-radius:5px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s}
.nav-btn:hover{color:var(--text2)}
.nav-btn.active{background:var(--bg4);color:var(--cyan);box-shadow:0 0 12px var(--cyan)22}
.topbar-r{display:flex;align-items:center;gap:8px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 6px var(--emerald);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slabel{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* MAIN */
.main{display:grid;grid-template-columns:196px 1fr;overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 0;overflow-y:auto;gap:16px}
.sb-section{padding:0 10px}
.sb-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:0 6px;margin-bottom:6px}
.sf{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;font-family:var(--grotesk);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:1px}
.sf:hover{background:var(--bg3);color:var(--text2)}
.sf.active{background:var(--bg3);color:var(--cyan);border-color:var(--border)}
.sf .ico{width:14px;height:14px;border-radius:3px;flex-shrink:0;font-size:9px;display:flex;align-items:center;justify-content:center}
.sf .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg2);padding:1px 6px;border-radius:10px;min-width:22px;text-align:center}

.sb-stats{margin:0 10px;padding:10px;border-radius:8px;background:var(--bg2);border:1px solid var(--border)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.sk{font-family:var(--mono);font-size:9px;color:var(--text3)}
.sv{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text)}

.add-proj{margin:0 10px;padding:8px;border-radius:7px;border:1px dashed var(--border2);background:transparent;color:var(--cyan);font-family:var(--grotesk);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-proj:hover{background:rgba(0,229,255,.06);border-color:var(--cyan);box-shadow:0 0 16px var(--cyan)18}

/* CONTENT */
.content{overflow-y:auto;padding:16px;background:var(--bg)}

/* PROJECTS GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* PROJECT CARD */
.pc{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;position:relative;animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pc:hover{border-color:var(--border2);transform:translateY(-1px)}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.pc.sp::before{background:linear-gradient(90deg,var(--cyan),var(--violet))}
.pc.sd::before{background:linear-gradient(90deg,var(--emerald),var(--lime))}
.pc.sr2::before{background:linear-gradient(90deg,var(--amber),var(--rose))}
.pc.sb::before{background:var(--rose)}

.pc-h{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.pc-tr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.pc-name{font-family:var(--grotesk);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.bdg{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.bp{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.2)}
.bd{background:rgba(52,211,153,.12);color:var(--emerald);border:1px solid rgba(52,211,153,.2)}
.br{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.bk{background:rgba(251,113,133,.12);color:var(--rose);border:1px solid rgba(251,113,133,.2)}
.pc-meta{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;gap:6px;align-items:center}
.ms{color:var(--border2)}

.pc-b{padding:10px 14px;flex:1;display:flex;flex-direction:column;gap:9px}

.pr{display:flex;align-items:center;gap:8px}
.pb{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .35s}
.sp .pf{background:linear-gradient(90deg,var(--cyan),var(--violet))}
.sd .pf{background:linear-gradient(90deg,var(--emerald),var(--lime))}
.sr2 .pf{background:linear-gradient(90deg,var(--amber),var(--rose))}
.sb .pf{background:var(--rose)}
.pp{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);min-width:30px;text-align:right}

.lrow{display:flex;gap:5px;flex-wrap:wrap}
.lc{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);color:var(--text2);text-decoration:none;transition:all .15s;background:var(--bg2);cursor:pointer}
.lc:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05)}
.lc.off{color:var(--text3);pointer-events:none;opacity:.35}
.ld{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.don{background:var(--emerald)}.doff{background:var(--text3)}
.la{font-size:8px;opacity:.5}

.as{display:flex;align-items:center;gap:4px}
.atag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px}
.aok{background:rgba(52,211,153,.1);color:var(--emerald)}
.abad{background:rgba(251,113,133,.1);color:var(--rose)}
.ana{background:rgba(255,255,255,.04);color:var(--text3)}
.asep{color:var(--text3);font-size:9px}

.pnotes{font-family:var(--manrope);font-size:11px;color:var(--text3);border-left:2px solid var(--border2);padding-left:8px;line-height:1.5}

.pc-f{padding:7px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:5px;background:var(--bg2)}
.ab{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.ab:hover{border-color:var(--border2);color:var(--text)}
.ab.del:hover{border-color:var(--rose);color:var(--rose)}

/* ACCOUNTS */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.ac{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .2s;position:relative;overflow:hidden;animation:fu .22s ease both}
.ac::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;filter:blur(28px);opacity:.15}
.ac.tg::after{background:#fff}.ac.ts::after{background:var(--emerald)}.ac.tv::after{background:#fff}.ac.tn::after{background:var(--cyan)}.ac.to::after{background:var(--violet)}
.ac:hover{border-color:var(--border2)}
.atypetag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:inline-block;padding:2px 7px;border-radius:3px}
.tg .atypetag,.tv .atypetag{background:rgba(255,255,255,.07);color:var(--text2)}
.ts .atypetag{background:rgba(52,211,153,.12);color:var(--emerald)}
.tn .atypetag{background:rgba(0,229,255,.12);color:var(--cyan)}
.to .atypetag{background:rgba(168,85,247,.12);color:var(--violet)}
.ac-name{font-family:var(--grotesk);font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.ac-email{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px}
.ac-kw{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px 9px;margin-bottom:8px}
.ac-kl{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.ac-kv{font-family:var(--mono);font-size:11px;color:var(--amber);word-break:break-all;line-height:1.4}
.ac-kv.h{color:var(--text3);letter-spacing:2px}
.ac-acts{display:flex;gap:5px;align-items:center}
.rvbtn{font-family:var(--mono);font-size:10px;padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.rvbtn:hover{border-color:var(--amber);color:var(--amber)}
.ac-url{font-family:var(--mono);font-size:10px;color:var(--cyan);text-decoration:none;margin-left:auto}
.ac-url:hover{text-decoration:underline}
.ac-del{font-family:var(--mono);font-size:10px;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.ac-del:hover{border-color:var(--rose);color:var(--rose)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;text-align:center}
.ei{font-size:32px;opacity:.1}
.et{font-family:var(--grotesk);font-size:14px;color:var(--text3)}

/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stitle{font-family:var(--sora);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:2px}

/* LOCK */
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg);position:relative;overflow:hidden}
.lg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black,transparent)}
.lglow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.1),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.lbox{position:relative;z-index:1;background:var(--bg1);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:18px}
.llogo{font-family:var(--sora);font-size:30px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ltag{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;text-align:center}
.ldiv{width:100%;height:1px;background:var(--border)}
.lfl{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;align-self:flex-start}
.linp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s;text-align:center;letter-spacing:3px}
.linp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.lbtn{width:100%;padding:11px;border-radius:8px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.08);color:var(--cyan);font-family:var(--grotesk);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lbtn:hover{background:rgba(0,229,255,.15);border-color:var(--cyan)}
.lerr{font-family:var(--mono);font-size:11px;color:var(--rose);text-align:center;min-height:16px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px}
.mtitle{font-family:var(--sora);font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
.fg{margin-bottom:12px}
.fg label{display:block;font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 11px;outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.08)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:56px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.mcan{font-family:var(--grotesk);font-size:12px;font-weight:500;padding:7px 16px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.mcan:hover{color:var(--text);border-color:var(--border3)}
.msav{font-family:var(--grotesk);font-size:12px;font-weight:700;padding:7px 16px;border-radius:6px;border:1px solid var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan);cursor:pointer;transition:all .2s}
.msav:hover{background:rgba(0,229,255,.18)}

.tab{display:none}.tab.active{display:block}
</style>
</head>
<body>

<div id="lockScreen" class="lock">
  <div class="lg"></div>
  <div class="lglow"></div>
  <div class="lbox">
    <div class="llogo">devhub</div>
    <div class="ltag">project control system</div>
    <div class="ldiv"></div>
    <div class="lfl">master key</div>
    <input id="masterInput" class="linp" type="password" placeholder="••••••••" autocomplete="off"/>
    <button class="lbtn" onclick="unlock()">iniciar sesión →</button>
    <div id="lockError" class="lerr"></div>
  </div>
</div>

<div id="appShell" class="shell" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:baseline;gap:4px">
      <div class="logo">devhub</div>
      <div class="logo-ver">v1.0</div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchTab('projects',this)">proyectos</button>
      <button class="nav-btn" onclick="switchTab('accounts',this)">cuentas</button>
    </div>
    <div class="topbar-r">
      <div class="sdot"></div>
      <div class="slabel">local · encrypted</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sb-section">
        <div class="sb-label">filtrar</div>
        <div class="sf active" onclick="setFilter('all',this)"><span class="ico" style="background:rgba(255,255,255,.05)">◈</span>todos<span class="cnt" id="cnt-all">0</span></div>
        <div class="sf" onclick="setFilter('progress',this)"><span class="ico" style="background:rgba(0,229,255,.1);color:var(--cyan)">▶</span>progreso<span class="cnt" id="cnt-progress">0</span></div>
        <div class="sf" onclick="setFilter('review',this)"><span class="ico" style="background:rgba(251,191,36,.1);color:var(--amber)">◎</span>revisar<span class="cnt" id="cnt-review">0</span></div>
        <div class="sf" onclick="setFilter('blocked',this)"><span class="ico" style="background:rgba(251,113,133,.1);color:var(--rose)">✕</span>bloqueado<span class="cnt" id="cnt-blocked">0</span></div>
        <div class="sf" onclick="setFilter('done',this)"><span class="ico" style="background:rgba(52,211,153,.1);color:var(--emerald)">✓</span>listo<span class="cnt" id="cnt-done">0</span></div>
      </div>
      <div class="sb-section">
        <div class="sb-label">stats</div>
        <div class="sb-stats">
          <div class="sr"><span class="sk">proyectos</span><span class="sv" id="st-total">0</span></div>
          <div class="sr"><span class="sk">avg %</span><span class="sv" id="st-avg">—</span></div>
          <div class="sr"><span class="sk">repos</span><span class="sv" id="st-repos">0</span></div>
          <div class="sr"><span class="sk">deploys</span><span class="sv" id="st-deploys">0</span></div>
        </div>
      </div>
      <div class="sb-section" style="margin-top:auto">
        <button class="add-proj" onclick="openProjectModal()"><span style="font-size:15px">+</span>nuevo proyecto</button>
      </div>
    </div>

    <div class="content">
      <div id="tab-projects" class="tab active">
        <div class="shdr">
          <div class="stitle" id="tabTitle">todos los proyectos</div>
        </div>
        <div id="pgrid" class="pgrid"></div>
      </div>
      <div id="tab-accounts" class="tab">
        <div class="shdr">
          <div class="stitle">cuentas</div>
          <button class="add-proj" style="margin:0;padding:5px 12px;font-size:11px" onclick="openAccountModal()">+ cuenta</button>
        </div>
        <div id="agrid" class="agrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div id="projectModal" class="overlay hidden">
  <div class="modal">
    <div class="mtitle" id="modalTitle">nuevo proyecto</div>
    <div class="frow">
      <div class="fg"><label>nombre</label><input id="f-name" placeholder="mi-proyecto"/></div>
      <div class="fg"><label>estado</label><select id="f-status"><option value="progress">en progreso</option><option value="review">revisar</option><option value="blocked">bloqueado</option><option value="done">listo</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>cuenta github</label><input id="f-ghAccount" placeholder="work / personal"/></div>
      <div class="fg"><label>avance %</label><input id="f-progress" type="number" min="0" max="100" placeholder="70"/></div>
    </div>
    <div class="fg"><label>url repositorio</label><input id="f-repo" placeholder="https://github.com/user/repo"/></div>
    <div class="frow">
      <div class="fg"><label>url supabase</label><input id="f-supabase" placeholder="https://xxx.supabase.co"/></div>
      <div class="fg"><label>proyecto supabase</label><input id="f-supabaseProject" placeholder="proj-xxxx"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label>url deploy</label><input id="f-deploy" placeholder="https://app.vercel.app"/></div>
      <div class="fg"><label>plataforma</label><select id="f-platform"><option value="">— ninguna —</option><option value="Vercel">Vercel</option><option value="Netlify">Netlify</option><option value="Railway">Railway</option><option value="Render">Render</option><option value="GitHub Pages">GitHub Pages</option><option value="Otro">Otro</option></select></div>
    </div>
    <div class="fg"><label>notas / blockers</label><textarea id="f-notes" placeholder="Falta configurar env vars..."></textarea></div>
    <div class="mfoot">
      <button class="mcan" onclick="closeProjectModal()">cancelar</button>
      <button class="msav" onclick="saveProject()">guardar proyecto</button>
    </div>
  </div>
</div>

<!-- ACCOUNT MODAL -->
<div id="accountModal" class="overlay hidden">
  <div class="modal">
    <div class="mtitle">nueva cuenta</div>
    <div class="frow">
      <div class="fg"><label>tipo</label><select id="a-type"><option value="github">GitHub</option><option value="supabase">Supabase</option><option value="vercel">Vercel</option><option value="netlify">Netlify</option><option value="otro">Otro</option></select></div>
      <div class="fg"><label>alias</label><input id="a-name" placeholder="work / personal"/></div>
    </div>
    <div class="fg"><label>email</label><input id="a-email" type="email" placeholder="tu@email.com"/></div>
    <div class="fg"><label>contraseña / token / api key</label><input id="a-key" type="password" placeholder="••••••••"/></div>
    <div class="fg"><label>url dashboard</label><input id="a-url" placeholder="https://supabase.com/dashboard/..."/></div>
    <div class="mfoot">
      <button class="mcan" onclick="closeAccountModal()">cancelar</button>
      <button class="msav" onclick="saveAccount()">guardar cuenta</button>
    </div>
  </div>
</div>

<script>
function xor(s,k){let o='';for(let i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^k.charCodeAt(i%k.length));return o}
function enc(s,k){return btoa(xor(s,k))}
function dec(s,k){try{return xor(atob(s),k)}catch{return null}}

let MK='',editId=null,curFilter='all';
const revealed=new Set();

function unlock(){
  const k=document.getElementById('masterInput').value.trim();
  if(!k){setErr('ingresa una clave');return}
  const st=localStorage.getItem('dh_mk');
  if(!st){localStorage.setItem('dh_mk',enc('devhub_ok',k));MK=k;boot()}
  else{const v=dec(st,k);if(v==='devhub_ok'){MK=k;boot()}else setErr('clave incorrecta')}
}
function setErr(m){document.getElementById('lockError').textContent=m}
document.getElementById('masterInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()})

function boot(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('appShell').style.display='grid';
  render();renderAccounts();
}

function gp(){try{return JSON.parse(localStorage.getItem('dh_projects')||'[]')}catch{return[]}}
function pp(a){localStorage.setItem('dh_projects',JSON.stringify(a))}
function ga(){
  try{return JSON.parse(localStorage.getItem('dh_accounts')||'[]').map(a=>({...a,key:a.key?dec(a.key,MK):''}))}
  catch{return[]}
}
function pa(a){localStorage.setItem('dh_accounts',JSON.stringify(a.map(x=>({...x,key:x.key?enc(x.key,MK):''}))))}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');btn.classList.add('active');
}
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.sf').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const t={all:'todos los proyectos',progress:'en progreso',review:'revisar',blocked:'bloqueados',done:'completados'};
  document.getElementById('tabTitle').textContent=t[f]||f;
  render();
}

const SM={
  progress:{cls:'sp',bdg:'bp',lbl:'progreso'},
  done:{cls:'sd',bdg:'bd',lbl:'listo'},
  review:{cls:'sr2',bdg:'br',lbl:'revisar'},
  blocked:{cls:'sb',bdg:'bk',lbl:'bloqueado'},
};

function chip(url,lbl,on){
  return on&&url
    ?`<a class="lc" href="${url}" target="_blank" rel="noopener"><span class="ld don"></span>${lbl}<span class="la">↗</span></a>`
    :`<span class="lc off"><span class="ld doff"></span>${lbl}</span>`;
}
function atag(ok,lbl){
  const c=ok===null?'ana':ok?'aok':'abad';
  return`<span class="atag ${c}">${lbl}${ok===null?' —':ok?' ✓':' ✗'}</span>`;
}

function stats(){
  const all=gp();
  document.getElementById('cnt-all').textContent=all.length;
  ['progress','review','blocked','done'].forEach(s=>document.getElementById('cnt-'+s).textContent=all.filter(p=>p.status===s).length);
  document.getElementById('st-total').textContent=all.length;
  const avg=all.length?Math.round(all.reduce((s,p)=>s+(parseInt(p.progress)||0),0)/all.length):null;
  document.getElementById('st-avg').textContent=avg!==null?avg+'%':'—';
  document.getElementById('st-repos').textContent=all.filter(p=>p.repo).length;
  document.getElementById('st-deploys').textContent=all.filter(p=>p.deploy).length;
}

function render(){
  const all=gp();
  const list=curFilter==='all'?all:all.filter(p=>p.status===curFilter);
  const el=document.getElementById('pgrid');
  if(!list.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ei">⬡</div><div class="et">sin proyectos${curFilter!=='all'?' en este estado':''}</div></div>`;stats();return}
  el.innerHTML=list.map((p,i)=>{
    const m=SM[p.status]||SM.progress;
    const pg=Math.min(100,Math.max(0,parseInt(p.progress)||0));
    const hr=!!p.repo,hd=!!p.supabase,hl=!!p.deploy;
    return`<div class="pc ${m.cls}" style="animation-delay:${i*35}ms">
      <div class="pc-h">
        <div class="pc-tr"><div class="pc-name">${p.name}</div><span class="bdg ${m.bdg}">${m.lbl}</span></div>
        <div class="pc-meta"><span>${p.ghAccount||'—'}</span><span class="ms">·</span><span>github</span>${p.supabaseProject?`<span class="ms">·</span><span>${p.supabaseProject}</span>`:''}</div>
      </div>
      <div class="pc-b">
        <div class="pr"><div class="pb"><div class="pf" style="width:${pg}%"></div></div><div class="pp">${pg}%</div></div>
        <div class="lrow">${chip(p.repo,'repo',hr)}${chip(p.supabase,'supabase',hd)}${chip(p.deploy,p.platform||'deploy',hl)}</div>
        <div class="as">${atag(hr,'repo')}<span class="asep">→</span>${atag(hd,'backend')}<span class="asep">→</span>${atag(hl,'deploy')}</div>
        ${p.notes?`<div class="pnotes">${p.notes}</div>`:''}
      </div>
      <div class="pc-f">
        <button class="ab" onclick="openProjectModal('${p.id}')">editar</button>
        <button class="ab del" onclick="delP('${p.id}')">eliminar</button>
      </div>
    </div>`;
  }).join('');
  stats();
}

function openProjectModal(id){
  editId=id||null;
  document.getElementById('modalTitle').textContent=id?'editar proyecto':'nuevo proyecto';
  const fs=['name','ghAccount','progress','repo','supabase','supabaseProject','deploy','notes'];
  if(id){const p=gp().find(x=>x.id===id);if(p){fs.forEach(f=>{const e=document.getElementById('f-'+f);if(e)e.value=p[f]||''});document.getElementById('f-status').value=p.status||'progress';document.getElementById('f-platform').value=p.platform||''}}
  else{fs.forEach(f=>{const e=document.getElementById('f-'+f);if(e)e.value=''});document.getElementById('f-status').value='progress';document.getElementById('f-platform').value=''}
  document.getElementById('projectModal').classList.remove('hidden');
}
function closeProjectModal(){document.getElementById('projectModal').classList.add('hidden')}
function delP(id){if(!confirm('¿Eliminar?'))return;pp(gp().filter(p=>p.id!==id));render()}
function saveProject(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Nombre requerido');return}
  const list=gp();
  const obj={id:editId||Date.now().toString(36),name,status:document.getElementById('f-status').value,ghAccount:document.getElementById('f-ghAccount').value.trim(),progress:document.getElementById('f-progress').value||'0',repo:document.getElementById('f-repo').value.trim(),supabase:document.getElementById('f-supabase').value.trim(),supabaseProject:document.getElementById('f-supabaseProject').value.trim(),deploy:document.getElementById('f-deploy').value.trim(),platform:document.getElementById('f-platform').value,notes:document.getElementById('f-notes').value.trim()};
  if(editId){const i=list.findIndex(p=>p.id===editId);if(i>-1)list[i]=obj}else list.push(obj);
  pp(list);closeProjectModal();render();
}

function openAccountModal(){document.getElementById('accountModal').classList.remove('hidden')}
function closeAccountModal(){document.getElementById('accountModal').classList.add('hidden');['a-name','a-email','a-key','a-url'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});document.getElementById('a-type').value='github'}
function saveAccount(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){alert('Alias requerido');return}
  const list=ga();
  list.push({id:Date.now().toString(36),type:document.getElementById('a-type').value,name,email:document.getElementById('a-email').value.trim(),key:document.getElementById('a-key').value,url:document.getElementById('a-url').value.trim()});
  pa(list);closeAccountModal();renderAccounts();
}
function delA(id){if(!confirm('¿Eliminar cuenta?'))return;pa(ga().filter(a=>a.id!==id));renderAccounts()}
function toggleRv(id){revealed.has(id)?revealed.delete(id):revealed.add(id);renderAccounts()}

const TC={github:'tg',supabase:'ts',vercel:'tv',netlify:'tn',otro:'to'};
function renderAccounts(){
  const list=ga();
  const el=document.getElementById('agrid');
  if(!list.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ei">⬡</div><div class="et">sin cuentas guardadas</div></div>`;return}
  el.innerHTML=list.map((a,i)=>{
    const show=revealed.has(a.id);
    const masked=a.key?'•'.repeat(Math.min(a.key.length,22)):'—';
    return`<div class="ac ${TC[a.type]||'to'}" style="animation-delay:${i*35}ms">
      <div class="atypetag">${a.type}</div>
      <div class="ac-name">${a.name}</div>
      <div class="ac-email">${a.email||'—'}</div>
      <div class="ac-kw"><div class="ac-kl">token / key</div><div class="ac-kv ${show?'':'h'}">${show?(a.key||'—'):masked}</div></div>
      <div class="ac-acts">
        <button class="rvbtn" onclick="toggleRv('${a.id}')">${show?'ocultar':'mostrar'}</button>
        ${a.url?`<a class="ac-url" href="${a.url}" target="_blank" rel="noopener">dashboard ↗</a>`:''}
        <button class="ac-del" onclick="delA('${a.id}')" style="margin-left:${a.url?'0':'auto'}">×</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('projectModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProjectModal()});
document.getElementById('accountModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAccountModal()});
</script>
</body>
</html>
