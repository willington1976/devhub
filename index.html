<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="description" content="Panel de control de proyectos personales"/>
<link rel="manifest" href="manifest.json"/>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js')</script>
<title>devhub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;
  --bg2:#111111;
  --bg3:#1a1a1a;
  --border:#2a2a2a;
  --border2:#333;
  --text:#e8e8e8;
  --muted:#666;
  --muted2:#444;
  --accent:#00ff88;
  --accent2:#00cc6a;
  --warn:#ffaa00;
  --danger:#ff4444;
  --info:#4488ff;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* layout */
.app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);letter-spacing:-0.5px}
.logo span{color:var(--muted);font-weight:400}
.nav{display:flex;gap:4px}
.nav-btn{font-family:var(--mono);font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--border2);color:var(--text)}
.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,.06)}
.content{flex:1;overflow-y:auto;padding:20px}

/* tabs */
.tab{display:none}
.tab.active{display:block}

/* projects list */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.filter-btn{font-family:var(--mono);font-size:11px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{border-color:var(--accent);color:var(--accent)}
.add-btn{font-family:var(--mono);font-size:12px;padding:7px 16px;border:1px solid var(--accent);border-radius:4px;background:rgba(0,255,136,.08);color:var(--accent);cursor:pointer;transition:all .15s;white-space:nowrap}
.add-btn:hover{background:rgba(0,255,136,.15)}

.projects{display:flex;flex-direction:column;gap:10px}
.project-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color .15s;cursor:default}
.project-card:hover{border-color:var(--border2)}
.project-card.blocked{border-left:3px solid var(--danger)}
.project-card.review{border-left:3px solid var(--warn)}
.project-card.done{border-left:3px solid var(--accent)}
.project-card.progress{border-left:3px solid var(--info)}

.pc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.pc-name{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text)}
.pc-account{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.pc-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:3px;font-weight:500}
.badge-progress{background:rgba(68,136,255,.15);color:var(--info);border:1px solid rgba(68,136,255,.3)}
.badge-done{background:rgba(0,255,136,.1);color:var(--accent);border:1px solid rgba(0,255,136,.25)}
.badge-review{background:rgba(255,170,0,.1);color:var(--warn);border:1px solid rgba(255,170,0,.25)}
.badge-blocked{background:rgba(255,68,68,.1);color:var(--danger);border:1px solid rgba(255,68,68,.25)}

.pc-links{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pc-link{font-family:var(--mono);font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;color:var(--info);background:transparent;cursor:pointer;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.pc-link:hover{border-color:var(--info);background:rgba(68,136,255,.08)}
.pc-link.disabled{color:var(--muted2);pointer-events:none;border-color:var(--border)}
.pc-link .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--accent)}
.dot-warn{background:var(--warn)}
.dot-off{background:var(--muted2)}

.pc-progress{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px;transition:width .3s}
.fill-hi{background:var(--accent)}
.fill-mid{background:var(--warn)}
.fill-lo{background:var(--danger)}
.pct{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:32px;text-align:right}

.pc-notes{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}

.pc-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}
.icon-btn{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--mono);transition:all .15s}
.icon-btn:hover{border-color:var(--border2);color:var(--text)}
.icon-btn.del:hover{border-color:var(--danger);color:var(--danger)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h3{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group select option{background:var(--bg2)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-cancel{font-family:var(--mono);font-size:12px;padding:8px 16px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer}
.btn-cancel:hover{color:var(--text);border-color:var(--border2)}
.btn-save{font-family:var(--mono);font-size:12px;padding:8px 16px;border:1px solid var(--accent);border-radius:4px;background:rgba(0,255,136,.1);color:var(--accent);cursor:pointer}
.btn-save:hover{background:rgba(0,255,136,.2)}

/* accounts tab */
.section-title{font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.accounts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:500px){.accounts-grid,.form-row{grid-template-columns:1fr}}
.account-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.account-card .ac-type{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.account-card .ac-name{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.account-card .ac-email{font-size:11px;color:var(--muted);margin-bottom:8px}
.account-card .ac-key{font-family:var(--mono);font-size:11px;color:var(--muted2);word-break:break-all}
.account-card .ac-key.reveal{color:var(--warn)}
.ac-actions{display:flex;gap:6px;margin-top:10px}
.reveal-btn{font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer}
.reveal-btn:hover{color:var(--warn);border-color:var(--warn)}

/* master lock */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:20px}
.lock-screen h2{font-family:var(--mono);color:var(--accent);font-size:24px}
.lock-screen p{color:var(--muted);font-size:13px;text-align:center;max-width:320px}
.lock-input{font-family:var(--mono);font-size:16px;padding:12px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);outline:none;width:100%;max-width:300px;text-align:center}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{font-family:var(--mono);font-size:14px;padding:10px 24px;border:1px solid var(--accent);border-radius:6px;background:rgba(0,255,136,.1);color:var(--accent);cursor:pointer;width:100%;max-width:300px}
.lock-btn:hover{background:rgba(0,255,136,.2)}
.lock-error{font-family:var(--mono);font-size:12px;color:var(--danger)}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:var(--mono);font-size:13px}
.empty span{display:block;font-size:28px;margin-bottom:8px;opacity:.3}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock-screen" style="height:100vh">
  <div class="logo" style="font-size:28px">dev<span>hub</span></div>
  <p id="lockMsg">Ingresa tu clave maestra para acceder. Esta clave cifra tus credenciales.</p>
  <input id="masterInput" class="lock-input" type="password" placeholder="clave maestra" autocomplete="off"/>
  <button class="lock-btn" onclick="unlock()">entrar →</button>
  <div id="lockError" class="lock-error" style="display:none"></div>
</div>

<!-- APP -->
<div id="appShell" class="app" style="display:none">
  <div class="topbar">
    <div class="logo">dev<span>hub</span></div>
    <div class="nav">
      <button class="nav-btn active" onclick="switchTab('projects',this)">proyectos</button>
      <button class="nav-btn" onclick="switchTab('accounts',this)">cuentas</button>
    </div>
  </div>
  <div class="content">

    <!-- PROJECTS TAB -->
    <div id="tab-projects" class="tab active">
      <div class="toolbar">
        <div class="toolbar-left" id="filterBtns">
          <button class="filter-btn active" onclick="setFilter('all',this)">todos</button>
          <button class="filter-btn" onclick="setFilter('progress',this)">en progreso</button>
          <button class="filter-btn" onclick="setFilter('review',this)">revisar</button>
          <button class="filter-btn" onclick="setFilter('blocked',this)">bloqueado</button>
          <button class="filter-btn" onclick="setFilter('done',this)">listo</button>
        </div>
        <button class="add-btn" onclick="openProjectModal()">+ proyecto</button>
      </div>
      <div id="projectsList" class="projects"></div>
    </div>

    <!-- ACCOUNTS TAB -->
    <div id="tab-accounts" class="tab">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="section-title">cuentas almacenadas</div>
        <button class="add-btn" onclick="openAccountModal()">+ cuenta</button>
      </div>
      <div id="accountsGrid" class="accounts-grid"></div>
    </div>

  </div>
</div>

<!-- PROJECT MODAL -->
<div id="projectModal" class="overlay hidden">
  <div class="modal">
    <h3 id="modalTitle">nuevo proyecto</h3>
    <div class="form-row">
      <div class="form-group">
        <label>nombre</label>
        <input id="f-name" placeholder="mi-proyecto"/>
      </div>
      <div class="form-group">
        <label>estado</label>
        <select id="f-status">
          <option value="progress">en progreso</option>
          <option value="review">revisar</option>
          <option value="blocked">bloqueado</option>
          <option value="done">listo</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>cuenta github</label>
        <input id="f-ghAccount" placeholder="work / personal"/>
      </div>
      <div class="form-group">
        <label>avance %</label>
        <input id="f-progress" type="number" min="0" max="100" placeholder="70"/>
      </div>
    </div>
    <div class="form-group">
      <label>url repositorio</label>
      <input id="f-repo" placeholder="https://github.com/user/repo"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>url supabase</label>
        <input id="f-supabase" placeholder="https://xxx.supabase.co"/>
      </div>
      <div class="form-group">
        <label>proyecto supabase</label>
        <input id="f-supabaseProject" placeholder="proj-xk92"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>url deploy</label>
        <input id="f-deploy" placeholder="https://mi-app.vercel.app"/>
      </div>
      <div class="form-group">
        <label>plataforma deploy</label>
        <select id="f-platform">
          <option value="">— ninguna —</option>
          <option value="Vercel">Vercel</option>
          <option value="Netlify">Netlify</option>
          <option value="Railway">Railway</option>
          <option value="Render">Render</option>
          <option value="GitHub Pages">GitHub Pages</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>notas / blockers</label>
      <textarea id="f-notes" placeholder="Falta configurar variables de entorno en Vercel..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProjectModal()">cancelar</button>
      <button class="btn-save" onclick="saveProject()">guardar</button>
    </div>
  </div>
</div>

<!-- ACCOUNT MODAL -->
<div id="accountModal" class="overlay hidden">
  <div class="modal">
    <h3>nueva cuenta</h3>
    <div class="form-group">
      <label>tipo</label>
      <select id="a-type">
        <option value="github">GitHub</option>
        <option value="supabase">Supabase</option>
        <option value="vercel">Vercel</option>
        <option value="netlify">Netlify</option>
        <option value="otro">Otro</option>
      </select>
    </div>
    <div class="form-group">
      <label>nombre / alias</label>
      <input id="a-name" placeholder="work / personal / cliente-x"/>
    </div>
    <div class="form-group">
      <label>email</label>
      <input id="a-email" type="email" placeholder="tu@email.com"/>
    </div>
    <div class="form-group">
      <label>contraseña / token / api key</label>
      <input id="a-key" type="password" placeholder="••••••••"/>
    </div>
    <div class="form-group">
      <label>url / dashboard</label>
      <input id="a-url" placeholder="https://supabase.com/dashboard/..."/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAccountModal()">cancelar</button>
      <button class="btn-save" onclick="saveAccount()">guardar</button>
    </div>
  </div>
</div>

<script>
// ─── SIMPLE XOR CIPHER (clave maestra) ───
function xorCipher(str, key){
  let out='';
  for(let i=0;i<str.length;i++) out+=String.fromCharCode(str.charCodeAt(i)^key.charCodeAt(i%key.length));
  return out;
}
function encode(str,key){return btoa(xorCipher(str,key))}
function decode(str,key){try{return xorCipher(atob(str),key)}catch{return null}}

let MASTER_KEY='';
let editingId=null;
let currentFilter='all';

// ─── LOCK ───
function unlock(){
  const k=document.getElementById('masterInput').value.trim();
  if(!k){showLockError('ingresa una clave');return}
  const stored=localStorage.getItem('dh_mk_check');
  if(!stored){
    // primer uso: guardar verificador
    localStorage.setItem('dh_mk_check',encode('devhub_ok',k));
    MASTER_KEY=k;
    bootApp();
  } else {
    const check=decode(stored,k);
    if(check==='devhub_ok'){MASTER_KEY=k;bootApp();}
    else showLockError('clave incorrecta');
  }
}
function showLockError(msg){
  const el=document.getElementById('lockError');
  el.textContent=msg;el.style.display='block';
}
document.getElementById('masterInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});

function bootApp(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  renderProjects();renderAccounts();
}

// ─── DATA ───
function getProjects(){
  const raw=localStorage.getItem('dh_projects');
  return raw?JSON.parse(raw):[];
}
function saveProjects(arr){localStorage.setItem('dh_projects',JSON.stringify(arr))}

function getAccounts(){
  const raw=localStorage.getItem('dh_accounts');
  if(!raw)return[];
  try{
    const arr=JSON.parse(raw);
    return arr.map(a=>({...a,key:a.key?decode(a.key,MASTER_KEY):''}));
  }catch{return[]}
}
function saveAccounts(arr){
  const encoded=arr.map(a=>({...a,key:a.key?encode(a.key,MASTER_KEY):''}));
  localStorage.setItem('dh_accounts',JSON.stringify(encoded));
}

// ─── NAV ───
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

// ─── FILTER ───
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

// ─── RENDER PROJECTS ───
function statusBadge(s){
  const map={progress:'badge-progress',done:'badge-done',review:'badge-review',blocked:'badge-blocked'};
  const label={progress:'en progreso',done:'listo',review:'revisar',blocked:'bloqueado'};
  return `<span class="badge ${map[s]||'badge-progress'}">${label[s]||s}</span>`;
}
function fillClass(p){
  if(p>=80)return'fill-hi';
  if(p>=40)return'fill-mid';
  return'fill-lo';
}
function linkEl(url,label,dotClass){
  if(url) return `<a class="pc-link" href="${url}" target="_blank" rel="noopener"><span class="dot ${dotClass}"></span>${label} ↗</a>`;
  return `<span class="pc-link disabled"><span class="dot dot-off"></span>${label}</span>`;
}

function renderProjects(){
  const list=getProjects();
  const filtered=currentFilter==='all'?list:list.filter(p=>p.status===currentFilter);
  const el=document.getElementById('projectsList');
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><span>◻</span>sin proyectos${currentFilter!=='all'?' en este filtro':''}</div>`;
    return;
  }
  el.innerHTML=filtered.map(p=>{
    const prog=parseInt(p.progress)||0;
    return`<div class="project-card ${p.status}" data-id="${p.id}">
      <div class="pc-head">
        <div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-account">${p.ghAccount||'—'} · github</div>
        </div>
        <div class="pc-badges">${statusBadge(p.status)}</div>
      </div>
      <div class="pc-links">
        ${linkEl(p.repo,'repo','dot-ok')}
        ${p.supabase?linkEl(p.supabase,'supabase','dot-ok'):linkEl(null,'supabase','')}
        ${p.deploy?linkEl(p.deploy,p.platform||'deploy','dot-ok'):linkEl(null,'deploy','')}
      </div>
      <div class="pc-progress">
        <div class="bar"><div class="fill ${fillClass(prog)}" style="width:${prog}%"></div></div>
        <div class="pct">${prog}%</div>
      </div>
      ${p.notes?`<div class="pc-notes">${p.notes}</div>`:''}
      <div class="pc-actions">
        <button class="icon-btn" onclick="editProject('${p.id}')">editar</button>
        <button class="icon-btn del" onclick="deleteProject('${p.id}')">eliminar</button>
      </div>
    </div>`;
  }).join('');
}

// ─── PROJECT MODAL ───
function openProjectModal(id){
  editingId=id||null;
  document.getElementById('modalTitle').textContent=id?'editar proyecto':'nuevo proyecto';
  const fields=['name','ghAccount','progress','repo','supabase','supabaseProject','deploy','notes'];
  if(id){
    const p=getProjects().find(x=>x.id===id);
    if(p){
      fields.forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=p[f]||''});
      document.getElementById('f-status').value=p.status||'progress';
      document.getElementById('f-platform').value=p.platform||'';
    }
  } else {
    fields.forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=''});
    document.getElementById('f-status').value='progress';
    document.getElementById('f-platform').value='';
  }
  document.getElementById('projectModal').classList.remove('hidden');
}
function closeProjectModal(){document.getElementById('projectModal').classList.add('hidden')}

function editProject(id){openProjectModal(id)}
function deleteProject(id){
  if(!confirm('¿Eliminar este proyecto?'))return;
  const list=getProjects().filter(p=>p.id!==id);
  saveProjects(list);renderProjects();
}

function saveProject(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('El nombre es obligatorio');return}
  const list=getProjects();
  const obj={
    id:editingId||Date.now().toString(36),
    name,
    status:document.getElementById('f-status').value,
    ghAccount:document.getElementById('f-ghAccount').value.trim(),
    progress:document.getElementById('f-progress').value||'0',
    repo:document.getElementById('f-repo').value.trim(),
    supabase:document.getElementById('f-supabase').value.trim(),
    supabaseProject:document.getElementById('f-supabaseProject').value.trim(),
    deploy:document.getElementById('f-deploy').value.trim(),
    platform:document.getElementById('f-platform').value,
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(editingId){
    const idx=list.findIndex(p=>p.id===editingId);
    if(idx>-1)list[idx]=obj;
  } else {list.push(obj)}
  saveProjects(list);closeProjectModal();renderProjects();
}

// ─── ACCOUNTS ───
function openAccountModal(){document.getElementById('accountModal').classList.remove('hidden')}
function closeAccountModal(){
  document.getElementById('accountModal').classList.add('hidden');
  ['a-type','a-name','a-email','a-key','a-url'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.value=el.tagName==='SELECT'?el.options[0].value:'';
  });
}

function saveAccount(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){alert('El alias es obligatorio');return}
  const list=getAccounts();
  list.push({
    id:Date.now().toString(36),
    type:document.getElementById('a-type').value,
    name,
    email:document.getElementById('a-email').value.trim(),
    key:document.getElementById('a-key').value,
    url:document.getElementById('a-url').value.trim(),
  });
  saveAccounts(list);closeAccountModal();renderAccounts();
}

function deleteAccount(id){
  if(!confirm('¿Eliminar esta cuenta?'))return;
  const list=getAccounts().filter(a=>a.id!==id);
  saveAccounts(list);renderAccounts();
}

const revealed=new Set();
function toggleReveal(id){
  if(revealed.has(id))revealed.delete(id);else revealed.add(id);
  renderAccounts();
}

const typeColors={
  github:'color:var(--text)',
  supabase:'color:#3ecf8e',
  vercel:'color:var(--text)',
  netlify:'color:#00ad9f',
  otro:'color:var(--muted)',
};
function renderAccounts(){
  const list=getAccounts();
  const el=document.getElementById('accountsGrid');
  if(!list.length){
    el.innerHTML=`<div class="empty" style="grid-column:1/-1"><span>◻</span>sin cuentas guardadas</div>`;
    return;
  }
  el.innerHTML=list.map(a=>{
    const show=revealed.has(a.id);
    const maskedKey=a.key?'•'.repeat(Math.min(a.key.length,20)):'—';
    const linkTag=a.url?`<a href="${a.url}" target="_blank" rel="noopener" style="font-family:var(--mono);font-size:10px;color:var(--info)">abrir dashboard ↗</a>`:'';
    return`<div class="account-card">
      <div class="ac-type" style="${typeColors[a.type]||''}">${a.type}</div>
      <div class="ac-name">${a.name}</div>
      <div class="ac-email">${a.email||'—'}</div>
      <div class="ac-key ${show?'reveal':''}">${show?(a.key||'—'):maskedKey}</div>
      <div class="ac-actions">
        <button class="reveal-btn" onclick="toggleReveal('${a.id}')">${show?'ocultar':'mostrar'}</button>
        ${linkTag}
        <button class="reveal-btn" style="margin-left:auto;color:var(--danger)" onclick="deleteAccount('${a.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

// close modals on overlay click
document.getElementById('projectModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProjectModal()});
document.getElementById('accountModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAccountModal()});
</script>
