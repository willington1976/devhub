<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#070710"/>
<link rel="manifest" href="manifest.json"/>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js')</script>
<title>devhub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070710;--bg1:#0d0d1a;--bg2:#12121f;--bg3:#181826;--bg4:#1e1e2e;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--b3:rgba(255,255,255,.22);
  --t1:#eeeef8;--t2:#8888aa;--t3:#44445a;
  --cy:#00e5ff;--cy2:rgba(0,229,255,.15);
  --vi:#a855f7;--vi2:rgba(168,85,247,.15);
  --em:#34d399;--em2:rgba(52,211,153,.15);
  --am:#fbbf24;--am2:rgba(251,191,36,.15);
  --ro:#fb7185;--ro2:rgba(251,113,133,.15);
  --li:#a3e635;
  --mono:'JetBrains Mono',monospace;
  --grotesk:'Space Grotesk',sans-serif;
  --sora:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--grotesk);font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* ═══ LOCK ═══ */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.lock-grid{position:absolute;inset:0;background-image:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 70% 80% at 50% 50%,#000,transparent)}
.lock-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.08),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%)}
.lock-box{position:relative;z-index:2;width:340px;background:var(--bg1);border:1px solid var(--b2);border-radius:20px;padding:36px 30px;display:flex;flex-direction:column;align-items:center;gap:16px}
.lock-logo{font-family:var(--sora);font-size:34px;font-weight:700;background:linear-gradient(135deg,var(--cy) 0%,var(--vi) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lock-sub{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.lock-sep{width:100%;height:1px;background:var(--b1)}
.lock-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;align-self:flex-start}
.lock-inp{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:10px;color:var(--t1);font-family:var(--mono);font-size:15px;padding:12px;outline:none;text-align:center;letter-spacing:4px;transition:border-color .2s,box-shadow .2s}
.lock-inp:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.lock-btn{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(0,229,255,.35);background:rgba(0,229,255,.09);color:var(--cy);font-family:var(--grotesk);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lock-btn:hover{background:rgba(0,229,255,.16)}
.lock-err{font-family:var(--mono);font-size:11px;color:var(--ro);min-height:14px}

/* ═══ APP SHELL ═══ */
#app{display:none;grid-template-columns:52px 1fr;grid-template-rows:48px 1fr;height:100vh}

/* ═══ TOPBAR ═══ */
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--b1);background:var(--bg1);gap:16px;position:relative}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--cy)55 30%,var(--vi)55 70%,transparent 100%);opacity:.4}
.tb-logo{font-family:var(--sora);font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--cy),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.tb-sep{width:1px;height:22px;background:var(--b2)}
.tb-nav{display:flex;gap:2px;flex:1}
.tb-btn{font-family:var(--grotesk);font-size:12px;font-weight:500;padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;transition:all .2s}
.tb-btn:hover{color:var(--t2)}
.tb-btn.on{background:var(--bg4);color:var(--cy)}
.tb-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 8px var(--em);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.tb-tag{font-family:var(--mono);font-size:9px;color:var(--t3)}
.tb-add{font-family:var(--grotesk);font-size:11px;font-weight:600;padding:6px 14px;border-radius:7px;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.07);color:var(--cy);cursor:pointer;transition:all .2s}
.tb-add:hover{background:rgba(0,229,255,.15)}

/* ═══ SIDEBAR ICON RAIL ═══ */
.rail{background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px}
.ri{width:34px;height:34px;border-radius:8px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.ri:hover{background:var(--bg3);color:var(--t2)}
.ri.on{background:var(--cy2);color:var(--cy)}
.ri-sep{width:24px;height:1px;background:var(--b1);margin:4px 0}

/* ═══ CONTENT ═══ */
.content{overflow-y:auto;background:var(--bg);padding:14px}
.tab{display:none}.tab.on{display:block}

/* ═══ DASHBOARD GRID ═══ */
.dash{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:auto;gap:10px}

/* KPI CARDS row */
.kpi{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer;user-select:none}
.kpi:hover{border-color:var(--b2);transform:translateY(-1px)}
.kpi:active{transform:translateY(0)}
.kpi.active-kpi{border-color:var(--b3);box-shadow:inset 0 0 0 1px var(--b2)}
.kpi::before{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;filter:blur(25px);opacity:.25}
.kpi-cy::before{background:var(--cy)}
.kpi-vi::before{background:var(--vi)}
.kpi-em::before{background:var(--em)}
.kpi-am::before{background:var(--am)}
.kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.kpi-val{font-family:var(--sora);font-size:28px;font-weight:700;line-height:1;margin-bottom:6px}
.kpi-cy .kpi-val{color:var(--cy)}
.kpi-vi .kpi-val{color:var(--vi)}
.kpi-em .kpi-val{color:var(--em)}
.kpi-am .kpi-val{color:var(--am)}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--t3);display:flex;align-items:center;gap:6px}
.kpi-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-fill{height:100%;border-radius:2px}
.kpi-cy .kpi-fill{background:linear-gradient(90deg,var(--cy),var(--vi))}
.kpi-vi .kpi-fill{background:linear-gradient(90deg,var(--vi),#ec4899)}
.kpi-em .kpi-fill{background:linear-gradient(90deg,var(--em),var(--li))}
.kpi-am .kpi-fill{background:linear-gradient(90deg,var(--am),var(--ro))}

/* PROJECTS PANEL */
.panel{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b1)}
.panel-title{font-family:var(--grotesk);font-size:13px;font-weight:600;color:var(--t1)}
.panel-meta{font-family:var(--mono);font-size:10px;color:var(--t3)}
.panel-body{padding:10px 0}

/* PROJECT ROW */
.prow{display:grid;grid-template-columns:24px 1fr 90px 130px 70px 60px;align-items:center;gap:8px;padding:7px 16px;transition:background .12s;cursor:default}
.prow:hover{background:var(--bg2)}
.prow-hdr{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:5px 16px 8px;display:grid;grid-template-columns:24px 1fr 90px 130px 70px 60px;gap:8px}
.prow-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-p{background:var(--cy);box-shadow:0 0 6px var(--cy)}
.dot-d{background:var(--em);box-shadow:0 0 6px var(--em)}
.dot-r{background:var(--am);box-shadow:0 0 6px var(--am)}
.dot-b{background:var(--ro);box-shadow:0 0 6px var(--ro)}
.prow-name{font-family:var(--grotesk);font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow-acct{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow-links{display:flex;gap:4px}
.plink{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid var(--b1);color:var(--cy);text-decoration:none;background:var(--cy2);transition:all .12s}
.plink:hover{border-color:var(--cy)}
.plink.na{color:var(--t3);background:transparent;pointer-events:none}
.align-chips{display:flex;gap:3px}
.ac{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:3px}
.ac-ok{background:var(--em2);color:var(--em)}
.ac-bad{background:var(--ro2);color:var(--ro)}
.ac-na{background:var(--b1);color:var(--t3)}
.prog-mini{display:flex;align-items:center;gap:6px}
.prog-mini-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-mini-fill{height:100%;border-radius:2px}
.fill-p{background:linear-gradient(90deg,var(--cy),var(--vi))}
.fill-d{background:linear-gradient(90deg,var(--em),var(--li))}
.fill-r{background:linear-gradient(90deg,var(--am),var(--ro))}
.fill-b{background:var(--ro)}
.prog-mini-pct{font-family:var(--mono);font-size:10px;color:var(--t2);min-width:28px;text-align:right}
.prow-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.prow:hover .prow-actions{opacity:1}
.rib{font-family:var(--mono);font-size:10px;padding:3px 7px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t3);cursor:pointer;transition:all .12s}
.rib:hover{color:var(--t1);border-color:var(--b2)}
.rib.d:hover{color:var(--ro);border-color:var(--ro)}

/* ACCOUNTS PANEL */
.ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;padding:12px}
.acard{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:14px;transition:border-color .2s;position:relative;overflow:hidden}
.acard::after{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;filter:blur(22px);opacity:.18}
.acard.tg::after{background:#e5e5e5}.acard.ts::after{background:var(--em)}.acard.tv::after{background:#e5e5e5}.acard.tn::after{background:var(--cy)}.acard.to::after{background:var(--vi)}
.acard:hover{border-color:var(--b2)}
.ac-type{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:8px}
.tg .ac-type,.tv .ac-type{background:rgba(255,255,255,.07);color:var(--t2)}
.ts .ac-type{background:var(--em2);color:var(--em)}
.tn .ac-type{background:var(--cy2);color:var(--cy)}
.to .ac-type{background:var(--vi2);color:var(--vi)}
.ac-name{font-family:var(--grotesk);font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.ac-email{font-family:var(--mono);font-size:10px;color:var(--t3);margin-bottom:10px}
.ac-kw{background:var(--bg3);border:1px solid var(--b1);border-radius:6px;padding:7px 10px;margin-bottom:8px}
.ac-kl{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.ac-kv{font-family:var(--mono);font-size:11px;color:var(--am);word-break:break-all;line-height:1.4}
.ac-kv.masked{color:var(--t3);letter-spacing:2px}
.ac-acts{display:flex;gap:5px;align-items:center}
.rvb{font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.rvb:hover{border-color:var(--am);color:var(--am)}
.ac-link{font-family:var(--mono);font-size:10px;color:var(--cy);text-decoration:none;margin-left:auto}
.ac-link:hover{text-decoration:underline}
.acdel{font-family:var(--mono);font-size:10px;padding:3px 6px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.acdel:hover{border-color:var(--ro);color:var(--ro)}

/* FILTER CHIPS */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fchip{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.fchip:hover{border-color:var(--b2);color:var(--t2)}
.fchip.on{border-color:var(--cy);color:var(--cy);background:var(--cy2)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.ov.h{display:none}
.modal{background:var(--bg1);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px}
.modal-title{font-family:var(--sora);font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--cy),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
.fg{margin-bottom:12px}
.fg label{display:block;font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:12px;padding:9px 12px;outline:none;transition:border-color .2s,box-shadow .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cy);box-shadow:0 0 0 2px rgba(0,229,255,.09)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:56px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--b1)}
.mcan{font-family:var(--grotesk);font-size:12px;font-weight:500;padding:7px 16px;border:1px solid var(--b2);border-radius:7px;background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.mcan:hover{color:var(--t1);border-color:var(--b3)}
.msav{font-family:var(--grotesk);font-size:12px;font-weight:700;padding:7px 16px;border-radius:7px;border:1px solid var(--cy);background:var(--cy2);color:var(--cy);cursor:pointer;transition:all .2s}
.msav:hover{background:rgba(0,229,255,.22)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:10px;text-align:center}
.empty-ico{font-size:30px;opacity:.1}
.empty-txt{font-family:var(--grotesk);font-size:13px;color:var(--t3)}

/* SPAN HELPERS */
.span2{grid-column:span 2}
.span3{grid-column:span 3}
.span4{grid-column:span 4}

/* BADGE STATUS IN TABLE */
.sbadge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.sb-p{background:var(--cy2);color:var(--cy)}
.sb-d{background:var(--em2);color:var(--em)}
.sb-r{background:var(--am2);color:var(--am)}
.sb-b{background:var(--ro2);color:var(--ro)}

/* ANIM */
@keyframes fup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.panel,.kpi,.acard{animation:fup .2s ease both}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-grid"></div>
  <div class="lock-orb"></div>
  <div class="lock-box">
    <div class="lock-logo">devhub</div>
    <div class="lock-sub">project control system</div>
    <div class="lock-sep"></div>
    <div class="lock-lbl">master key</div>
    <div style="width:100%;position:relative">
      <input id="mi" class="lock-inp" type="password" placeholder="••••••••" autocomplete="off" style="padding-right:40px"/>
      <button id="eye-btn" onclick="toggleEye()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px;transition:color .15s" onmouseover="this.style.color='var(--t2)'" onmouseout="this.style.color='var(--t3)'">◉</button>
    </div>
    <button class="lock-btn" onclick="unlock()">acceder →</button>
    <div id="le" class="lock-err"></div>
    <button onclick="resetKey()" style="background:none;border:none;font-family:var(--mono);font-size:9px;color:var(--t3);cursor:pointer;text-decoration:underline;padding:0" onmouseover="this.style.color='var(--ro)'" onmouseout="this.style.color='var(--t3)'">¿olvidaste tu clave? resetear</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-logo">devhub</div>
    <div class="tb-sep"></div>
    <div class="tb-nav">
      <button class="tb-btn on" onclick="showTab('projects',this)">proyectos</button>
      <button class="tb-btn" onclick="showTab('accounts',this)">cuentas</button>
    </div>
    <div class="tb-right">
      <span class="pulse"></span>
      <span class="tb-tag">local · encrypted</span>
      <div class="tb-sep"></div>
      <button class="tb-add" onclick="openPM()">+ nuevo proyecto</button>
    </div>
  </div>

  <!-- RAIL -->
  <div class="rail">
    <button class="ri on" title="Dashboard">⬡</button>
    <div class="ri-sep"></div>
    <button class="ri" title="Proyectos" onclick="showTab('projects',null)">◈</button>
    <button class="ri" title="Cuentas" onclick="showTab('accounts',null)">▣</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- PROJECTS TAB -->
    <div id="tab-projects" class="tab on">

      <!-- KPI ROW -->
      <div class="dash" style="margin-bottom:10px">
        <div class="kpi kpi-cy" style="animation-delay:0ms" onclick="kpiFilter('all',this)" id="kpi-card-all">
          <div class="kpi-lbl">total proyectos</div>
          <div class="kpi-val" id="kpi-total">0</div>
          <div class="kpi-sub"><span id="kpi-pct-done">0%</span><span>completados</span></div>
          <div class="kpi-bar"><div class="kpi-fill" id="kpi-bar-done" style="width:0%"></div></div>
        </div>
        <div class="kpi kpi-vi" style="animation-delay:50ms" onclick="kpiFilter('progress',this)" id="kpi-card-progress">
          <div class="kpi-lbl">en progreso</div>
          <div class="kpi-val" id="kpi-progress">0</div>
          <div class="kpi-sub"><span id="kpi-avg">—</span><span>avance promedio</span></div>
          <div class="kpi-bar"><div class="kpi-fill" id="kpi-bar-prog" style="width:0%"></div></div>
        </div>
        <div class="kpi kpi-em" style="animation-delay:100ms" onclick="kpiFilter('repos',this)" id="kpi-card-repos">
          <div class="kpi-lbl">repos conectados</div>
          <div class="kpi-val" id="kpi-repos">0</div>
          <div class="kpi-sub"><span id="kpi-deploys">0</span><span>con deploy</span></div>
          <div class="kpi-bar"><div class="kpi-fill" id="kpi-bar-repos" style="width:0%"></div></div>
        </div>
        <div class="kpi kpi-am" style="animation-delay:150ms" onclick="kpiFilter('blocked',this)" id="kpi-card-blocked">
          <div class="kpi-lbl">bloqueados</div>
          <div class="kpi-val" id="kpi-blocked">0</div>
          <div class="kpi-sub"><span id="kpi-review">0</span><span>por revisar</span></div>
          <div class="kpi-bar"><div class="kpi-fill" id="kpi-bar-block" style="width:0%"></div></div>
        </div>
      </div>

      <!-- PROJECTS TABLE -->
      <div class="panel span4" style="animation-delay:200ms">
        <div class="panel-head">
          <div class="panel-title">mis proyectos</div>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="filter-row" style="margin:0" id="filterRow">
              <button class="fchip on" onclick="setF('all',this)">todos</button>
              <button class="fchip" onclick="setF('progress',this)">progreso</button>
              <button class="fchip" onclick="setF('review',this)">revisar</button>
              <button class="fchip" onclick="setF('blocked',this)">bloqueado</button>
              <button class="fchip" onclick="setF('done',this)">listo</button>
            </div>
          </div>
        </div>
        <div class="panel-body">
          <div class="prow-hdr">
            <span></span><span>proyecto</span><span>estado</span><span>links</span><span>alineación</span><span>avance</span>
          </div>
          <div id="plist"></div>
        </div>
      </div>

    </div><!-- /projects tab -->

    <!-- ACCOUNTS TAB -->
    <div id="tab-accounts" class="tab">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:2px">cuentas almacenadas</span>
        <button class="tb-add" onclick="openAM()">+ nueva cuenta</button>
      </div>
      <div id="agrid" class="ac-grid"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- PROJECT MODAL -->
<div id="pm" class="ov h">
  <div class="modal">
    <div class="modal-title" id="pm-title">nuevo proyecto</div>
    <div class="frow"><div class="fg"><label>nombre</label><input id="f-name" placeholder="mi-proyecto"/></div><div class="fg"><label>estado</label><select id="f-status"><option value="progress">en progreso</option><option value="review">revisar</option><option value="blocked">bloqueado</option><option value="done">listo</option></select></div></div>
    <div class="frow"><div class="fg"><label>cuenta github</label><input id="f-gha" placeholder="work / personal"/></div><div class="fg"><label>avance %</label><input id="f-prog" type="number" min="0" max="100" placeholder="70"/></div></div>
    <div class="fg"><label>url repositorio</label><input id="f-repo" placeholder="https://github.com/user/repo"/></div>
    <div class="frow"><div class="fg"><label>url supabase</label><input id="f-supa" placeholder="https://xxx.supabase.co"/></div><div class="fg"><label>id supabase</label><input id="f-supid" placeholder="proj-xxxx"/></div></div>
    <div class="frow"><div class="fg"><label>url deploy</label><input id="f-dep" placeholder="https://app.vercel.app"/></div><div class="fg"><label>plataforma</label><select id="f-plat"><option value="">— ninguna —</option><option>Vercel</option><option>Netlify</option><option>Railway</option><option>Render</option><option>GitHub Pages</option><option>Otro</option></select></div></div>
    <div class="fg"><label>notas / blockers</label><textarea id="f-notes" placeholder="Pendiente: configurar env vars en Vercel..."></textarea></div>
    <div class="mfoot"><button class="mcan" onclick="closePM()">cancelar</button><button class="msav" onclick="saveP()">guardar</button></div>
  </div>
</div>

<!-- ACCOUNT MODAL -->
<div id="am" class="ov h">
  <div class="modal">
    <div class="modal-title">nueva cuenta</div>
    <div class="frow"><div class="fg"><label>tipo</label><select id="a-type"><option value="github">GitHub</option><option value="supabase">Supabase</option><option value="vercel">Vercel</option><option value="netlify">Netlify</option><option value="otro">Otro</option></select></div><div class="fg"><label>alias</label><input id="a-name" placeholder="work / personal"/></div></div>
    <div class="fg"><label>email</label><input id="a-email" type="email" placeholder="tu@email.com"/></div>
    <div class="fg"><label>contraseña / token / api key</label><input id="a-key" type="password" placeholder="••••••••"/></div>
    <div class="fg"><label>url dashboard</label><input id="a-url" placeholder="https://supabase.com/dashboard/..."/></div>
    <div class="mfoot"><button class="mcan" onclick="closeAM()">cancelar</button><button class="msav" onclick="saveA()">guardar</button></div>
  </div>
</div>

<script>
// CRYPTO
function xor(s,k){let o='';for(let i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^k.charCodeAt(i%k.length));return o}
function enc(s,k){return btoa(xor(s,k))}
function dec(s,k){try{return xor(atob(s),k)}catch{return null}}

let MK='',EID=null,CF='all';
const RV=new Set();

// LOCK
function toggleEye(){
  const inp=document.getElementById('mi');
  const btn=document.getElementById('eye-btn');
  if(inp.type==='password'){inp.type='text';btn.textContent='◡'}
  else{inp.type='password';btn.textContent='◉'}
}
function unlock(){
  const k=document.getElementById('mi').value.trim();
  if(!k){le('ingresa una clave');return}
  const st=localStorage.getItem('dh_mk2');
  if(!st){localStorage.setItem('dh_mk2',enc('devhub_ok',k));MK=k;boot()}
  else{const v=dec(st,k);if(v==='devhub_ok'){MK=k;boot()}else le('clave incorrecta — o usa "resetear" si olvidaste tu clave')}
}
function resetKey(){
  if(!confirm('¿Resetear clave maestra? Se borrarán tus cuentas cifradas (los proyectos se conservan).'))return;
  localStorage.removeItem('dh_mk2');localStorage.removeItem('dh_mk');localStorage.removeItem('dh_a');
  document.getElementById('le').textContent='Clave reseteada. Ingresa una nueva.';
  document.getElementById('mi').value='';
}
function le(m){document.getElementById('le').textContent=m}
document.getElementById('mi').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()})

function boot(){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='grid';
  render();renderA();
}

// DATA
function gp(){try{return JSON.parse(localStorage.getItem('dh_p')||'[]')}catch{return[]}}
function sp(a){localStorage.setItem('dh_p',JSON.stringify(a))}
function ga(){
  try{return JSON.parse(localStorage.getItem('dh_a')||'[]').map(a=>({...a,key:a.key?dec(a.key,MK):''}))}
  catch{return[]}
}
function sa(a){localStorage.setItem('dh_a',JSON.stringify(a.map(x=>({...x,key:x.key?enc(x.key,MK):''}))))}

// TABS
function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tb-btn').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
}

// KPI CARD CLICK → filter
function kpiFilter(type, card){
  // highlight card
  document.querySelectorAll('.kpi').forEach(k=>k.classList.remove('active-kpi'));
  card.classList.add('active-kpi');
  // map kpi type to filter
  const map={all:'all',progress:'progress',blocked:'blocked',repos:'all'};
  const f=map[type]||'all';
  // sync fchip UI
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  const chip=document.querySelector(`.fchip[onclick="setF('${f}',this)"]`);
  if(chip)chip.classList.add('on');
  // if repos → filter only projects with repo
  if(type==='repos'){CF='repos';render();}
  else{CF=f;render();}
  // scroll to table
  document.querySelector('.panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// FILTER
function setF(f,btn){
  CF=f;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.kpi').forEach(k=>k.classList.remove('active-kpi'));
  render();
}

// STATS
const SM={
  progress:{dot:'dot-p',badge:'sb-p',fill:'fill-p',lbl:'progreso'},
  done:{dot:'dot-d',badge:'sb-d',fill:'fill-d',lbl:'listo'},
  review:{dot:'dot-r',badge:'sb-r',fill:'fill-r',lbl:'revisar'},
  blocked:{dot:'dot-b',badge:'sb-b',fill:'fill-b',lbl:'bloqueado'},
};

function kpis(){
  const all=gp();const n=all.length||1;
  const done=all.filter(p=>p.status==='done').length;
  const prog=all.filter(p=>p.status==='progress').length;
  const blk=all.filter(p=>p.status==='blocked').length;
  const rev=all.filter(p=>p.status==='review').length;
  const repos=all.filter(p=>p.repo).length;
  const deps=all.filter(p=>p.dep).length;
  const avg=all.length?Math.round(all.reduce((s,p)=>s+(parseInt(p.prog)||0),0)/all.length):0;
  document.getElementById('kpi-total').textContent=all.length;
  document.getElementById('kpi-pct-done').textContent=Math.round(done/n*100)+'%';
  document.getElementById('kpi-bar-done').style.width=Math.round(done/n*100)+'%';
  document.getElementById('kpi-progress').textContent=prog;
  document.getElementById('kpi-avg').textContent=avg+'%';
  document.getElementById('kpi-bar-prog').style.width=avg+'%';
  document.getElementById('kpi-repos').textContent=repos;
  document.getElementById('kpi-deploys').textContent=deps;
  document.getElementById('kpi-bar-repos').style.width=Math.round(repos/n*100)+'%';
  document.getElementById('kpi-blocked').textContent=blk;
  document.getElementById('kpi-review').textContent=rev;
  document.getElementById('kpi-bar-block').style.width=Math.round((blk+rev)/n*100)+'%';
}

function lchip(url,lbl){
  return url
    ?`<a class="plink" href="${url}" target="_blank" rel="noopener">${lbl}↗</a>`
    :`<span class="plink na">${lbl}</span>`;
}
function at(ok,lbl){return`<span class="ac ${ok===null?'ac-na':ok?'ac-ok':'ac-bad'}">${lbl}</span>`}

function render(){
  const all=gp();
  const list=CF==='all'?all:CF==='repos'?all.filter(p=>p.repo):all.filter(p=>p.status===CF);
  const el=document.getElementById('plist');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-ico">⬡</div><div class="empty-txt">sin proyectos${CF!=='all'?' en este estado':''}</div></div>`;kpis();return}
  el.innerHTML=list.map((p,i)=>{
    const m=SM[p.status]||SM.progress;
    const pg=Math.min(100,Math.max(0,parseInt(p.prog)||0));
    const hr=!!p.repo,hd=!!p.supa,hl=!!p.dep;
    return`<div class="prow" style="animation-delay:${i*25}ms">
      <div><span class="prow-dot ${m.dot}"></span></div>
      <div><div class="prow-name">${p.name}</div><div class="prow-acct">${p.gha||'—'} · ${p.supid||'—'}</div></div>
      <div><span class="sbadge ${m.badge}">${m.lbl}</span></div>
      <div class="prow-links">${lchip(p.repo,'repo ')}${lchip(p.supa,'db ')}${lchip(p.dep,p.plat||'deploy ')}</div>
      <div class="align-chips">${at(hr,'R')}${at(hd,'B')}${at(hl,'D')}</div>
      <div class="prog-mini">
        <div class="prog-mini-bar"><div class="prog-mini-fill ${m.fill}" style="width:${pg}%"></div></div>
        <div class="prog-mini-pct">${pg}%</div>
        <div class="prow-actions">
          <button class="rib" onclick="openPM('${p.id}')">✎</button>
          <button class="rib d" onclick="delP('${p.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
  kpis();
}

// PROJECT CRUD
function openPM(id){
  EID=id||null;
  document.getElementById('pm-title').textContent=id?'editar proyecto':'nuevo proyecto';
  const fs={name:'',gha:'',prog:'',repo:'',supa:'',supid:'',dep:'',notes:''};
  if(id){const p=gp().find(x=>x.id===id);if(p){Object.keys(fs).forEach(f=>{const e=document.getElementById('f-'+f);if(e)e.value=p[f]||''});document.getElementById('f-status').value=p.status||'progress';document.getElementById('f-plat').value=p.plat||''}}
  else{Object.keys(fs).forEach(f=>{const e=document.getElementById('f-'+f);if(e)e.value=''});document.getElementById('f-status').value='progress';document.getElementById('f-plat').value=''}
  document.getElementById('pm').classList.remove('h');
}
function closePM(){document.getElementById('pm').classList.add('h')}
function delP(id){if(!confirm('¿Eliminar?'))return;sp(gp().filter(p=>p.id!==id));render()}
function saveP(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Nombre requerido');return}
  const list=gp();
  const o={id:EID||Date.now().toString(36),name,status:document.getElementById('f-status').value,gha:document.getElementById('f-gha').value.trim(),prog:document.getElementById('f-prog').value||'0',repo:document.getElementById('f-repo').value.trim(),supa:document.getElementById('f-supa').value.trim(),supid:document.getElementById('f-supid').value.trim(),dep:document.getElementById('f-dep').value.trim(),plat:document.getElementById('f-plat').value,notes:document.getElementById('f-notes').value.trim()};
  if(EID){const i=list.findIndex(p=>p.id===EID);if(i>-1)list[i]=o}else list.push(o);
  sp(list);closePM();render();
}

// ACCOUNTS
function openAM(){document.getElementById('am').classList.remove('h')}
function closeAM(){document.getElementById('am').classList.add('h');['a-name','a-email','a-key','a-url'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});document.getElementById('a-type').value='github'}
function saveA(){
  const name=document.getElementById('a-name').value.trim();
  if(!name){alert('Alias requerido');return}
  const list=ga();
  list.push({id:Date.now().toString(36),type:document.getElementById('a-type').value,name,email:document.getElementById('a-email').value.trim(),key:document.getElementById('a-key').value,url:document.getElementById('a-url').value.trim()});
  sa(list);closeAM();renderA();
}
function delA(id){if(!confirm('¿Eliminar?'))return;sa(ga().filter(a=>a.id!==id));renderA()}
function tvRV(id){RV.has(id)?RV.delete(id):RV.add(id);renderA()}

const TC={github:'tg',supabase:'ts',vercel:'tv',netlify:'tn',otro:'to'};
function renderA(){
  const list=ga();
  const el=document.getElementById('agrid');
  if(!list.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-ico">⬡</div><div class="empty-txt">sin cuentas</div></div>`;return}
  el.innerHTML=list.map((a,i)=>{
    const show=RV.has(a.id);
    const masked='•'.repeat(Math.min((a.key||'').length,20)||8);
    return`<div class="acard ${TC[a.type]||'to'}" style="animation-delay:${i*30}ms">
      <div class="ac-type">${a.type}</div>
      <div class="ac-name">${a.name}</div>
      <div class="ac-email">${a.email||'—'}</div>
      <div class="ac-kw"><div class="ac-kl">token / key</div><div class="ac-kv ${show?'':'masked'}">${show?(a.key||'—'):masked}</div></div>
      <div class="ac-acts">
        <button class="rvb" onclick="tvRV('${a.id}')">${show?'ocultar':'mostrar'}</button>
        ${a.url?`<a class="ac-link" href="${a.url}" target="_blank" rel="noopener">dashboard ↗</a>`:''}
        <button class="acdel" onclick="delA('${a.id}')" style="margin-left:${a.url?'0':'auto'}">×</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('pm').addEventListener('click',e=>{if(e.target===e.currentTarget)closePM()});
document.getElementById('am').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAM()});
</script>
</body>
</html>
